{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-lg-8">
        <div class="glass-card p-5">
            <div class="text-center mb-5">
                <div class="d-inline-flex align-items-center justify-content-center bg-success text-white rounded-circle shadow-sm mb-4" style="width: 80px; height: 80px; font-size: 2rem;">
                    <i class="fas fa-envelope-open-text"></i>
                </div>
                <h1 class="fw-bold">{{ _('contacts') }}</h1>
                <p class="text-muted lead">Мы всегда открыты для предложений и сотрудничества.</p>
            </div>
            
            <div class="row g-4 mb-5">
                <div class="col-md-6">
                    <div class="p-4 border rounded-4 text-center h-100 bg-light bg-opacity-50">
                        <i class="fas fa-envelope fa-2x text-primary mb-3"></i>
                        <h5 class="fw-bold">Email</h5>
                        <p class="text-muted mb-0">info@newskz.kz<br>press@newskz.kz</p>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="p-4 border rounded-4 text-center h-100 bg-light bg-opacity-50">
                        <i class="fas fa-map-marker-alt fa-2x text-danger mb-3"></i>
                        <h5 class="fw-bold">Адрес</h5>
                        <p class="text-muted mb-0">г. Астана, ул. Мангилик Ел, 55<br>Astana Hub</p>
                    </div>
                </div>
            </div>

            <h4 class="fw-bold mb-4">Напишите нам</h4>
            <form>
                <div class="row g-3">
                    <div class="col-md-6">
                        <input type="text" class="form-control p-3 bg-light border-0" placeholder="Ваше имя" required>
                    </div>
                    <div class="col-md-6">
                        <input type="email" class="form-control p-3 bg-light border-0" placeholder="Ваш Email" required>
                    </div>
                    <div class="col-12">
                        <textarea class="form-control p-3 bg-light border-0" rows="5" placeholder="Сообщение" required></textarea>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Отправить сообщение <i class="fas fa-paper-plane ms-2"></i></button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
